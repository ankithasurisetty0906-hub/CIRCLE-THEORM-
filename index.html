<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Theorem: A-B-C</title>
    <style>
        :root { --primary: #2563eb; --secondary: #db2777; --bg: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        .card { 
            background: white; padding: 1.5rem; border-radius: 1.5rem; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
            width: 100%; max-width: 950px; position: relative; border: 1px solid #e2e8f0; 
        }

        h1 { margin: 0 0 1.5rem 0; font-size: 1.4rem; text-align: center; color: #1e293b; width: 100%; }

        .app-container { display: flex; flex-direction: row; align-items: center; gap: 30px; }

        @media (max-width: 750px) {
            .app-container { flex-direction: column; }
            .card { max-width: 500px; }
        }

        .svg-container { flex: 2; position: relative; min-width: 300px; }
        svg { width: 100%; height: auto; aspect-ratio: 1/1; touch-action: none; border-radius: 1rem; background: #ffffff; border: 1px solid #f1f5f9; }
        
        .controls { 
            flex: 1; display: flex; flex-direction: column; gap: 25px; background: #f8fafc; 
            padding: 20px; border-radius: 1rem; border: 1px solid #e2e8f0; min-width: 220px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        input { 
            padding: 12px; border: 2px solid #cbd5e1; border-radius: 0.75rem; 
            font-size: 1.4rem; font-weight: bold; color: #1e293b; text-align: center;
        }

        .angle-arc { fill: none; stroke-width: 3; opacity: 0.6; stroke-linecap: round; }
        .arc-center { stroke: var(--secondary); }
        .arc-circ { stroke: var(--primary); }
        .angle-label { font-size: 20px; font-weight: 800; pointer-events: none; text-shadow: 1px 1px 0px white; }
        .center-val { fill: var(--secondary); }
        .circ-val { fill: var(--primary); }
        
        #warning { 
            position: absolute; top: 10px; right: 10px;
            background: #fffbeb; color: #b45309; padding: 6px 12px; border-radius: 10px;
            font-size: 0.7rem; font-weight: bold; border: 1px solid #fde68a;
            display: none; z-index: 10;
        }

        .draggable { cursor: move; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Circle Theorem Investigation</h1>
        
        <div class="app-container">
            <div class="svg-container">
                <div id="warning">REFLEX ANGLE CASE</div>
                <svg id="canvas" viewBox="0 0 500 500">
                    <circle cx="250" cy="250" r="200" fill="none" stroke="#e2e8f0" stroke-width="2" />
                    <path id="arc-center" class="angle-arc arc-center" />
                    <path id="arc-circ" class="angle-arc arc-circ" />
                    <line id="line-OA" x1="250" y1="250" stroke="var(--secondary)" stroke-width="2.5" />
                    <line id="line-OB" x1="250" y1="250" stroke="var(--secondary)" stroke-width="2.5" />
                    <line id="line-CA" stroke="var(--primary)" stroke-width="2.5" stroke-dasharray="5 3" />
                    <line id="line-CB" stroke="var(--primary)" stroke-width="2.5" stroke-dasharray="5 3" />
                    <text id="val-center" class="angle-label center-val" text-anchor="middle"></text>
                    <text id="val-circ" class="angle-label circ-val" text-anchor="middle"></text>
                    <circle id="O" cx="250" cy="250" r="6" fill="#1e293b" />
                    <circle id="A" class="draggable" r="15" fill="var(--secondary)" />
                    <circle id="B" class="draggable" r="15" fill="var(--secondary)" />
                    <circle id="C" class="draggable" r="15" fill="var(--primary)" />
                    <text id="txt-O" x="235" y="240" font-size="16" font-weight="bold" fill="#94a3b8">O</text>
                    <text id="txt-A" font-weight="bold" font-size="22"></text>
                    <text id="txt-B" font-weight="bold" font-size="22"></text>
                    <text id="txt-C" font-weight="bold" font-size="22"></text>
                </svg>
            </div>

            <div class="controls">
                <div class="input-group">
                    <label>∠AOB (Center)</label>
                    <input type="number" id="inp-center" step="0.5">
                </div>
                <div class="input-group">
                    <label>∠ACB (Circumference)</label>
                    <input type="number" id="inp-circ" step="0.5">
                </div>
                <p style="font-size: 0.7rem; color: #94a3b8; text-align: center; margin: 0;">Drag A, B, or C. Calculations support 0.5° steps.</p>
            </div>
        </div>
    </div>

<script>
    const svg = document.getElementById('canvas');
    const inpCenter = document.getElementById('inp-center');
    const inpCirc = document.getElementById('inp-circ');
    const warning = document.getElementById('warning');
    
    let state = { A: 210, B: 330, C: 90, active: null };

    function polarToXY(deg, r, center = {x:250, y:250}) {
        const rad = deg * Math.PI / 180;
        return { x: center.x + r * Math.cos(rad), y: center.y + r * Math.sin(rad) };
    }

    // Improved Arc function to prevent "full circle" glitches
    function drawSimpleArc(cx, cy, r, startDeg, endDeg, clockwise) {
        const start = polarToXY(startDeg, r, {x:cx, y:cy});
        const end = polarToXY(endDeg, r, {x:cx, y:cy});
        
        let diff = endDeg - startDeg;
        while (diff < 0) diff += 360;
        while (diff > 360) diff -= 360;

        const sweepFlag = clockwise ? 1 : 0;
        // If we want the "short" way, largeArc is 0. If diff > 180, largeArc is 1.
        let largeArcFlag = diff > 180 ? 1 : 0;
        if (!clockwise) largeArcFlag = diff > 180 ? 0 : 1;

        return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArcFlag} ${sweepFlag} ${end.x} ${end.y}`;
    }

    function update() {
        const cx = 250, cy = 250, r = 200;
        const pts = { A: polarToXY(state.A, r), B: polarToXY(state.B, r), C: polarToXY(state.C, r) };

        ['A', 'B', 'C'].forEach(id => {
            document.getElementById(id).setAttribute('cx', pts[id].x);
            document.getElementById(id).setAttribute('cy', pts[id].y);
            const t = document.getElementById('txt-' + id);
            const pos = polarToXY(state[id], r + 35);
            t.setAttribute('x', pos.x - 8); t.setAttribute('y', pos.y + 8);
            t.textContent = id;
        });

        document.getElementById('line-OA').setAttribute('x2', pts.A.x);
        document.getElementById('line-OA').setAttribute('y2', pts.A.y);
        document.getElementById('line-OB').setAttribute('x2', pts.B.x);
        document.getElementById('line-OB').setAttribute('y2', pts.B.y);
        document.getElementById('line-CA').setAttribute('x1', pts.C.x);
        document.getElementById('line-CA').setAttribute('y1', pts.C.y);
        document.getElementById('line-CA').setAttribute('x2', pts.A.x);
        document.getElementById('line-CA').setAttribute('y2', pts.A.y);
        document.getElementById('line-CB').setAttribute('x1', pts.C.x);
        document.getElementById('line-CB').setAttribute('y1', pts.C.y);
        document.getElementById('line-CB').setAttribute('x2', pts.B.x);
        document.getElementById('line-CB').setAttribute('y2', pts.B.y);

        // Logic for Center Angle (A to B)
        let diff = state.B - state.A;
        while (diff < 0) diff += 360;
        
        let cRel = state.C - state.A;
        while (cRel < 0) cRel += 360;
        
        // Reflex happens if C is "between" A and B on the minor arc
        const isReflex = cRel > 0 && cRel < diff;
        let cenAng = isReflex ? 360 - diff : diff;
        warning.style.display = isReflex ? 'block' : 'none';
        let circAng = cenAng / 2;

        // Draw Center Arc
        if (isReflex) {
            document.getElementById('arc-center').setAttribute("d", drawSimpleArc(cx, cy, 40, state.B, state.A, true));
        } else {
            document.getElementById('arc-center').setAttribute("d", drawSimpleArc(cx, cy, 40, state.A, state.B, true));
        }

        // Draw Circumference Arc (at Point C)
        let angCA = Math.atan2(pts.A.y - pts.C.y, pts.A.x - pts.C.x) * 180 / Math.PI;
        let angCB = Math.atan2(pts.B.y - pts.C.y, pts.B.x - pts.C.x) * 180 / Math.PI;
        
        let angleDiff = angCB - angCA;
        while (angleDiff < -180) angleDiff += 360;
        while (angleDiff > 180) angleDiff -= 360;
        
        // Use a fixed small arc at C that doesn't flip
        document.getElementById('arc-circ').setAttribute("d", drawSimpleArc(pts.C.x, pts.C.y, 45, angCA, angCB, angleDiff > 0));

        // Update Text Labels
        const midCen = isReflex ? (state.B + (360-diff)/2) : (state.A + diff/2);
        const cp = polarToXY(midCen, 80);
        document.getElementById('val-center').setAttribute('x', cp.x);
        document.getElementById('val-center').setAttribute('y', cp.y);
        document.getElementById('val-center').textContent = parseFloat(cenAng.toFixed(1)) + "°";

        const crp = polarToXY(state.C, r - 75);
        document.getElementById('val-circ').setAttribute('x', crp.x);
        document.getElementById('val-circ').setAttribute('y', crp.y);
        document.getElementById('val-circ').textContent = parseFloat(circAng.toFixed(1)) + "°";

        inpCenter.value = parseFloat(cenAng.toFixed(1));
        inpCirc.value = parseFloat(circAng.toFixed(1));
    }

    const getAng = (x, y) => {
        const rect = svg.getBoundingClientRect();
        let a = Math.atan2(y - (rect.top + rect.height/2), x - (rect.left + rect.width/2)) * 180 / Math.PI;
        return a < 0 ? a + 360 : a;
    };

    const move = (e) => {
        if (!state.active) return;
        const cX = e.touches ? e.touches[0].clientX : e.clientX;
        const cY = e.touches ? e.touches[0].clientY : e.clientY;
        // Dragging uses whole numbers for smoothness, input allows 0.5
        state[state.active] = Math.round(getAng(cX, cY));
        update();
    };

    svg.addEventListener('mousedown', e => { if(e.target.classList.contains('draggable')) state.active = e.target.id; });
    svg.addEventListener('touchstart', e => { if(e.target.classList.contains('draggable')) { state.active = e.target.id; e.preventDefault(); } });
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move, {passive: false});
    window.addEventListener('mouseup', () => state.active = null);
    window.addEventListener('touchend', () => state.active = null);

    inpCenter.addEventListener('input', e => { 
        let val = parseFloat(e.target.value) || 0;
        state.B = (state.A + val) % 360; 
        update(); 
    });
    inpCirc.addEventListener('input', e => { 
        let val = parseFloat(e.target.value) || 0;
        state.B = (state.A + (val * 2)) % 360; 
        update(); 
    });
    
    update();
</script>
</body>
</html>
